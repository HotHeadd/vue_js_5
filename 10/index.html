<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PixiJS v8 — вращающийся прямоугольник</title>
  <style>body { margin: 0; background: #000; overflow: hidden; }</style>
  <script type="importmap">
  {
    "imports": {
      "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.mjs"
    }
  }
  </script>
</head>
<body>
  <script type="module">
    import { Application, Graphics } from 'pixi.js';

    (async () => {
      const app = new Application();
      await app.init({
        autoDensity: true,
        resolution: window.devicePixelRatio || 1,
        background: '#111111',
		antialias: true
      });
      document.body.appendChild(app.canvas);

      const rect = new Graphics();
      rect.rect(-100, -50, 200, 100);
      rect.fill('#ffffff');
      rect.position.set(app.screen.width / 2, app.screen.height / 2);
      app.stage.addChild(rect);

      app.ticker.add(() => {
        rect.rotation += 0.02;
      });
    })();
  </script>
</body>
</html>
